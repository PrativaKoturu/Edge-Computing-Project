[env:edge-rl-node]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.4
  marcoschwartz/LiquidCrystal_I2C@^1.1.4
build_flags =
  -DNODE_ID='"edge-rl-node"'
  -DMQTT_HOST='"host.wokwi.internal"'
  -DMQTT_PORT=1883
