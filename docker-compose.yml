services:
  trainer:
    build:
      context: ./control-plane
    environment:
      MQTT_HOST: broker.hivemq.com
      MQTT_PORT: "1883"
      EDGE_NODE_IDS: "zone-a"
      LOG_LEVEL: INFO
    command: ["python", "-m", "control_plane.trainer"]

  traffic:
    build:
      context: ./control-plane
    environment:
      MQTT_HOST: broker.hivemq.com
      MQTT_PORT: "1883"
      EDGE_NODE_IDS: "zone-a"
      BURST_PERIOD_S: "30"
      BURST_SIZE: "20"
      DATA_DIR: /app/data
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "control_plane.dataset_traffic_generator"]
