services:
  broker:
    image: eclipse-mosquitto:2
    container_name: mosquitto-oncloud
    ports:
      - "11883:1883"  # Different port to avoid conflict with on-device
    command: mosquitto -c /mosquitto-no-auth.conf

  trainer:
    build:
      context: ../control-plane
    container_name: trainer-oncloud
    environment:
      # Default: connect to local mosquitto service ("broker").
      # For Wokwi/public-broker demos, run with:
      #   MQTT_HOST=broker.hivemq.com MQTT_PORT=1883 docker compose up -d --build
      MQTT_HOST: ${MQTT_HOST:-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      EDGE_NODE_IDS: "zone-a"
      LOG_LEVEL: INFO
    depends_on:
      - broker
    command: ["python", "-m", "control_plane.trainer"]

  traffic:
    build:
      context: ../control-plane
    container_name: traffic-oncloud
    environment:
      MQTT_HOST: ${MQTT_HOST:-broker}
      MQTT_PORT: ${MQTT_PORT:-1883}
      EDGE_NODE_IDS: "zone-a"
      BURST_PERIOD_S: "30"
      BURST_SIZE: "20"
      DATA_DIR: /app/data
      LOG_LEVEL: INFO
    volumes:
      - ../data:/app/data
    depends_on:
      - broker
    command: ["python", "-m", "control_plane.dataset_traffic_generator"]
